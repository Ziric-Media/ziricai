<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ziric Media AI — Firebase Auth Test</title>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "./node_modules/firebase/app/dist/esm/index.esm.js",
      "firebase/auth": "./node_modules/firebase/auth/dist/esm/index.esm.js",
      "firebase/firestore": "./node_modules/firebase/firestore/dist/esm/index.esm.js",
      "firebase/storage": "./node_modules/firebase/storage/dist/esm/index.esm.js",
      "@firebase/app": "./node_modules/@firebase/app/dist/esm/index.esm.js",
      "@firebase/auth": "./node_modules/@firebase/auth/dist/esm/index.js",
      "@firebase/firestore": "./node_modules/@firebase/firestore/dist/index.esm.js",
      "@firebase/storage": "./node_modules/@firebase/storage/dist/index.esm.js",
      "@firebase/util": "./node_modules/@firebase/util/dist/index.esm.js",
      "@firebase/logger": "./node_modules/@firebase/logger/dist/esm/index.esm.js",
      "@firebase/component": "./node_modules/@firebase/component/dist/esm/index.esm.js",
      "@firebase/webchannel-wrapper/bloom-blob": "./node_modules/@firebase/webchannel-wrapper/dist/bloom-blob/esm/bloom_blob_es2018.js",
      "@firebase/webchannel-wrapper/webchannel-blob": "./node_modules/@firebase/webchannel-wrapper/dist/webchannel-blob/esm/webchannel_blob_es2018.js",
      "idb": "./node_modules/idb/build/index.js",
      "re2js": "./node_modules/re2js/build/index.esm.js"
    }
  }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 24px auto; padding: 0 16px; }
    input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-right: 8px; margin-top: 8px; padding: 8px 12px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 12px; overflow: auto; font-size: 13px; }
    .section { margin-top: 24px; padding-top: 16px; border-top: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>Firebase Auth Test</h1>
  <p>ZiricAI — authentication, session API, and MFA scaffold</p>

  <div>
    <label>
      Email<br>
      <input type="email" id="email" autocomplete="username">
    </label>
  </div>
  <br>
  <div>
    <label>
      Password<br>
      <input type="password" id="password" autocomplete="current-password">
    </label>
  </div>
  <br>
  <div>
    <button type="button" id="register-btn">Register</button>
    <button type="button" id="login-btn">Login</button>
    <button type="button" id="logout-btn">Logout</button>
  </div>
  <br>
  <p id="status">Status: checking...</p>

  <div class="section">
    <h2>Session API</h2>
    <button type="button" id="session-btn">GET /api/auth/session</button>
    <pre id="session-output">(not loaded)</pre>
  </div>

  <div class="section">
    <h2>MFA scaffold</h2>
    <p>Placeholder for Firebase TOTP enrollment. Sets <code>mfaEnabled</code> on your Firestore profile.</p>
    <button type="button" id="mfa-enable-btn">Enable MFA (demo flag)</button>
    <p id="mfa-status"></p>
  </div>

  <script>
    if (location.protocol === 'file:') {
      document.getElementById('status').textContent =
        'Status: Cannot load ES modules from file://. Run "npm install" then "npm run dev" and open http://localhost:3000/auth-test.html';
    }
  </script>

  <script type="module">
    if (location.protocol === 'file:') {
      throw new Error('Use a local HTTP server; file:// is not supported.');
    }

    let registerUser, loginUser, logoutUser, observeAuthState, resolveAuthProfile, getIdToken;
    let updateUserProfile, apiRequest;
    try {
      ({ registerUser, loginUser, logoutUser, observeAuthState, resolveAuthProfile, getIdToken } = await import('./js/auth.js'));
      ({ updateUserProfile } = await import('./js/users.js'));
      ({ apiRequest } = await import('./js/shared/apiRequest.js'));
    } catch (err) {
      document.getElementById('status').textContent =
        'Status: Failed to load auth modules. Run npm install, serve over HTTP, and check the console. (' + err.message + ')';
      throw err;
    }

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const statusEl = document.getElementById('status');
    const sessionOutput = document.getElementById('session-output');
    const mfaStatus = document.getElementById('mfa-status');

    function getCredentials() {
      return {
        email: emailInput.value.trim(),
        password: passwordInput.value,
      };
    }

    function updateAuthStatus(user) {
      if (user) {
        statusEl.textContent = `Status: Logged In — ${user.email} (${user.uid.slice(0, 8)}…)`;
      } else {
        statusEl.textContent = 'Status: Logged Out';
        sessionOutput.textContent = '(not loaded)';
      }
    }

    observeAuthState(updateAuthStatus);

    document.getElementById('register-btn').addEventListener('click', async () => {
      const { email, password } = getCredentials();
      const result = await registerUser(email, password);
      if (result.error) {
        statusEl.textContent = `Status: ${result.error}`;
      }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const { email, password } = getCredentials();
      const result = await loginUser(email, password);
      if (result.error) {
        statusEl.textContent = `Status: ${result.error}`;
        return;
      }
      const profile = result.profile || (await resolveAuthProfile(result.user, { allowDemo: true }));
      if (profile) {
        statusEl.textContent += ` | role=${profile.role} company=${profile.companyId || profile.company || 'n/a'}`;
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      const result = await logoutUser();
      if (result.error) {
        statusEl.textContent = `Status: ${result.error}`;
      }
    });

    document.getElementById('session-btn').addEventListener('click', async () => {
      sessionOutput.textContent = 'Loading...';
      const result = await apiRequest('/api/auth/session');
      if (result.error) {
        sessionOutput.textContent = `Error: ${result.error} (${result.status || ''})`;
        return;
      }
      sessionOutput.textContent = JSON.stringify(result.data, null, 2);
    });

    document.getElementById('mfa-enable-btn').addEventListener('click', async () => {
      const token = await getIdToken();
      if (!token) {
        mfaStatus.textContent = 'Sign in first.';
        return;
      }
      const session = await apiRequest('/api/auth/session');
      const uid = session.data?.uid;
      if (!uid) {
        mfaStatus.textContent = 'Could not resolve uid from session.';
        return;
      }
      const updated = await updateUserProfile(uid, { mfaEnabled: true });
      if (updated.error) {
        mfaStatus.textContent = updated.error;
        return;
      }
      mfaStatus.textContent = 'MFA demo flag enabled on profile (mfaEnabled=true). Full TOTP enrollment coming in Settings.';
    });
  </script>
</body>
</html>
